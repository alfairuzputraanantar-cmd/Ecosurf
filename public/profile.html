<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CocaCoy ERP – My Profile</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <script>
    (function () {
      const t = localStorage.getItem('cocacoy_theme');
      if (t === 'light') document.documentElement.setAttribute('data-theme', 'light');
    })();
  </script>
  <style>
    .profile-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 24px;
    }
    .profile-header {
      padding: 30px;
      background: linear-gradient(135deg, rgba(200, 149, 108, .1), rgba(160, 113, 79, .05));
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 24px;
    }
    .profile-avatar-large {
      width: 100px;
      height: 100px;
      border-radius: 24px;
      background: var(--brand-grd);
      display: grid;
      place-items: center;
      font-size: 40px;
      font-weight: 800;
      color: #fff;
      font-family: var(--font-hd);
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0,0,0,.2);
    }
    .profile-avatar-large img {
      width: 100%; height: 100%; object-fit: cover;
    }
    .profile-title-area h2 {
      font-family: var(--font-hd);
      font-size: 24px;
      margin-bottom: 4px;
    }
    .profile-title-area p {
      color: var(--muted);
      font-size: 14px;
    }
    .profile-body {
      padding: 30px;
    }
    .profile-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }
    @media (max-width: 768px) {
      .profile-grid { grid-template-columns: 1fr; }
      .profile-header { flex-direction: column; text-align: center; }
    }
    .account-info-box {
      background: var(--surface2);
      border-radius: 12px;
      padding: 20px;
      margin-top: 24px;
      display: flex;
      flex-wrap: wrap;
      gap: 30px;
    }
    .info-item label {
      display: block;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      margin-bottom: 5px;
      font-weight: 700;
    }
    .info-item span {
      font-weight: 600;
      font-size: 14px;
    }
    .saved-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(34, 201, 151, .12);
      border: 1px solid rgba(34, 201, 151, .25);
      color: var(--green);
      padding: 5px 13px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      opacity: 0;
      transition: opacity .3s;
    }
    .saved-badge.show { opacity: 1; }
  </style>
</head>
<body>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-img-wrap"><img src="cocacoy_logo.jpeg" alt="CocaCoy" /></div>
      <div class="logo-text-wrap">
        <div class="logo-name">CocaCoy</div>
        <div class="logo-tag">ERP System</div>
      </div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Main Menu</div>
      <a class="nav-link" href="/"><i class="fas fa-chart-pie"></i> Dashboard</a>
      <a class="nav-link" href="product"><i class="fas fa-boxes-stacked"></i> Products</a>
      <a class="nav-link" href="history"><i class="fas fa-clock-rotate-left"></i> History</a>
      <a class="nav-link" href="chart"><i class="fas fa-chart-line"></i> Charts</a>
      <a class="nav-link" href="cashier"><i class="fas fa-cash-register"></i> Cashier</a>
    </div>
    <div class="sidebar-section" style="margin-top:6px;">
      <div class="sidebar-label">Other</div>
      <a class="nav-link" href="settings"><i class="fas fa-gear"></i> Settings</a>
      <a class="nav-link" href="help"><i class="fas fa-circle-question"></i> Help</a>
    </div>
    <div class="sidebar-footer">
      <a href="profile" class="user-pill" id="sidebarUserPill">
        <div class="user-avatar" id="sidebarAvatar">U</div>
        <div class="user-info">
          <div class="user-name" id="sidebarName">Owner</div>
          <div class="user-role" id="sidebarRole">UMKM Admin</div>
        </div>
      </a>
      <button class="logout-btn" id="logoutBtn"><i class="fas fa-right-from-bracket"></i> Sign Out</button>
    </div>
    <script>
      (function() {
        try {
          const p = JSON.parse(localStorage.getItem('cocacoy_profile') || '{}');
          if (p.ownerName) document.getElementById('sidebarName').textContent = p.ownerName;
          if (p.role) document.getElementById('sidebarRole').textContent = p.role;
          const logo = localStorage.getItem('cocacoy_store_logo');
          if (logo) {
            const html = `<img src="${logo}" style="width:100%;height:100%;object-fit:cover;border-radius:inherit;"/>`;
            document.getElementById('sidebarAvatar').innerHTML = html;
          } else if (p.ownerName) {
            document.getElementById('sidebarAvatar').textContent = p.ownerName.charAt(0).toUpperCase();
          }
        } catch(e) {}
      })();
    </script>
  </aside>

  <div class="main-wrap">
    <div class="topbar">
      <div>
        <div class="topbar-title">My Profile</div>
        <div class="topbar-sub">Manage your personal and business identity</div>
      </div>
      <div class="topbar-right">
        <button class="theme-toggle-btn" id="themeToggleBtn" title="Toggle light/dark mode">
          <i class="fas fa-moon" id="themeIcon"></i>
        </button>
        <button class="icon-btn" id="menuToggle" style="display:none;"><i class="fas fa-bars"></i></button>
      </div>
    </div>

    <div class="content">
      <div class="profile-card">
        <div class="profile-header">
          <div class="profile-avatar-large" id="profileAvatarLarge">U</div>
          <div class="profile-title-area">
            <h2 id="profileDisplayName">Owner Name</h2>
            <p id="profileDisplayRole">UMKM Admin</p>
            <button class="btn btn-ghost btn-sm" style="margin-top:12px;" onclick="document.getElementById('avatarInput').click()">
              <i class="fas fa-camera"></i> Change Photo
            </button>
            <input type="file" id="avatarInput" accept="image/*" style="display:none;" onchange="previewAvatar(event)" />
          </div>
        </div>
        <div class="profile-body">
          <div class="profile-grid">
            <div class="form-group">
              <label class="form-label">Store Name</label>
              <input class="form-control" id="storeName" type="text" placeholder="e.g. CocaCoy" />
            </div>
            <div class="form-group">
              <label class="form-label">Owner Name</label>
              <input class="form-control" id="ownerName" type="text" placeholder="Your name" />
            </div>
            <div class="form-group">
              <label class="form-label">WhatsApp Number</label>
              <input class="form-control" id="storePhone" type="tel" placeholder="+62 8xx..." />
            </div>
            <div class="form-group">
              <label class="form-label">Business Role</label>
              <input class="form-control" id="userRole" type="text" placeholder="e.g. Owner, Admin" />
            </div>
            <div class="form-group" style="grid-column: 1 / -1;">
              <label class="form-label">Business Category</label>
              <select class="form-control" id="storeCategory">
                <option value="food">Food & Beverage</option>
                <option value="retail">Retail / Shop</option>
                <option value="fashion">Fashion & Clothing</option>
                <option value="electronics">Electronics</option>
                <option value="beauty">Beauty & Cosmetics</option>
                <option value="other">Other</option>
              </select>
            </div>
            <div class="form-group" style="grid-column: 1 / -1;">
              <label class="form-label">Business Description</label>
              <textarea class="form-control" id="storeDesc" rows="3" placeholder="A short bio..."></textarea>
            </div>
          </div>
          
          <div style="display:flex;align-items:center;gap:12px;margin-top:20px;">
            <button class="btn btn-primary" onclick="saveProfile()">
              <i class="fas fa-check-circle"></i> Update Profile
            </button>
            <span class="saved-badge" id="profileSaved"><i class="fas fa-circle-check"></i> Changes saved</span>
          </div>

          <div class="account-info-box">
            <div class="info-item">
              <label>Account Email</label>
              <span id="profileEmail">loading...</span>
            </div>
            <div class="info-item">
              <label>Member Since</label>
              <span id="profileJoinDate">loading...</span>
            </div>
            <div class="info-item">
              <label>Account Type</label>
              <span style="color:var(--brand-1);"><i class="fas fa-star" style="font-size:10px;"></i> Premium UMKM</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>
  <script type="module" src="./js/guard.js"></script>
  <script src="./js/ui.js"></script>
  <script type="module">
    import { auth, userDoc, storage, ref, uploadBytes, getDownloadURL } from './js/firebase.js';
    import { updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    async function loadProfile() {
      try {
        const p = JSON.parse(localStorage.getItem('cocacoy_profile') || '{}');
        document.getElementById('storeName').value = p.storeName || '';
        document.getElementById('ownerName').value = p.ownerName || '';
        document.getElementById('userRole').value = p.role || '';
        document.getElementById('storeDesc').value = p.storeDesc || '';
        document.getElementById('storePhone').value = p.storePhone || '';
        document.getElementById('storeCategory').value = p.storeCategory || 'food';
        
        document.getElementById('profileDisplayName').textContent = p.ownerName || 'Owner';
        document.getElementById('profileDisplayRole').textContent = p.role || 'UMKM Admin';

        const logo = localStorage.getItem('cocacoy_store_logo');
        if (logo) {
          const img = `<img src="${logo}" alt="Avatar"/>`;
          document.getElementById('profileAvatarLarge').innerHTML = img;
        } else if (p.ownerName) {
          document.getElementById('profileAvatarLarge').textContent = p.ownerName.charAt(0).toUpperCase();
        }
      } catch (e) {}
    }

    window.previewAvatar = function(e) {
      const file = e.target.files[0];
      if (!file) return;
      if (file.size > 1048576) { showToast('File too large (max 1 MB)', 'error'); return; }
      const reader = new FileReader();
      reader.onload = ev => {
        const dataURL = ev.target.result;
        document.getElementById('profileAvatarLarge').innerHTML = `<img src="${dataURL}" alt="Avatar"/>`;
        document.getElementById('sidebarAvatar').innerHTML = `<img src="${dataURL}" style="width:100%;height:100%;object-fit:cover;border-radius:inherit;"/>`;
        localStorage.setItem('cocacoy_store_logo', dataURL);
      };
      reader.readAsDataURL(file);
    };

    window.saveProfile = async function() {
      const btn = document.querySelector('button[onclick="saveProfile()"]');
      const originalBtnHtml = btn.innerHTML;
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Saving...';

      const data = {
        storeName: document.getElementById('storeName').value.trim(),
        ownerName: document.getElementById('ownerName').value.trim(),
        role:      document.getElementById('userRole').value.trim(),
        storeDesc: document.getElementById('storeDesc').value.trim(),
        storePhone: document.getElementById('storePhone').value.trim(),
        storeCategory: document.getElementById('storeCategory').value,
      };

      try {
        if (auth.currentUser) {
          const updateData = { ...data, updatedAt: new Date().toISOString() };
          const avatarInput = document.getElementById('avatarInput');
          if (avatarInput.files && avatarInput.files[0]) {
            const file = avatarInput.files[0];
            const storageRef = ref(storage, `users/${auth.currentUser.uid}/profile.png`);
            const snapshot = await uploadBytes(storageRef, file);
            const photoURL = await getDownloadURL(snapshot.ref);
            updateData.photoURL = photoURL;
            localStorage.setItem('cocacoy_store_logo', photoURL);
          }
          await updateDoc(userDoc(auth.currentUser.uid), updateData);
          
          localStorage.setItem('cocacoy_profile', JSON.stringify({ ...data, role: data.role }));
          document.getElementById('profileDisplayName').textContent = data.ownerName;
          document.getElementById('profileDisplayRole').textContent = data.role;
          
          showToast('Profile updated!', 'success');
          const badge = document.getElementById('profileSaved');
          badge.classList.add('show');
          setTimeout(() => badge.classList.remove('show'), 2500);
        }
      } catch (e) {
        console.error(e);
        showToast('Sync failed.', 'error');
      } finally {
        btn.disabled = false;
        btn.innerHTML = originalBtnHtml;
      }
    };

    document.addEventListener('userReady', loadProfile);
    
    // Theme toggle logic
    (function() {
      const btn = document.getElementById('themeToggleBtn');
      const icon = document.getElementById('themeIcon');
      function applyTheme(theme) {
        if (theme === 'light') {
          document.documentElement.setAttribute('data-theme', 'light');
          icon.className = 'fas fa-sun';
        } else {
          document.documentElement.removeAttribute('data-theme');
          icon.className = 'fas fa-moon';
        }
        localStorage.setItem('cocacoy_theme', theme);
      }
      applyTheme(localStorage.getItem('cocacoy_theme') || 'dark');
      btn.addEventListener('click', () => {
        const current = localStorage.getItem('cocacoy_theme') || 'dark';
        applyTheme(current === 'dark' ? 'light' : 'dark');
      });
    })();

    window.showToast = function(msg, type='info') {
      const ic = { success:'fa-circle-check', error:'fa-circle-xmark', info:'fa-circle-info' };
      const el = document.createElement('div');
      el.className = 'toast ' + type;
      el.innerHTML = `<i class="fas ${ic[type]||ic.info}"></i> ${msg}`;
      document.getElementById('toast-container').appendChild(el);
      setTimeout(() => el.remove(), 3500);
    };
  </script>
</body>
</html>
