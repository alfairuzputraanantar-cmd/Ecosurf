<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CocaCoy ERP – Register</title>
  <link rel="stylesheet" href="auth.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body class="auth-page">

  <div class="auth-card">

    <div class="auth-logo">
      <div class="logo-img-wrap">
        <img src="cocacoy_logo.jpeg" alt="CocaCoy"/>
      </div>
      <div class="brand">CocaCoy</div>
      <div class="tagline">Create your business account today</div>
    </div>

    <div class="auth-section-title">Create a New Account</div>

    <div class="form-row">
      <div class="input-group">
        <label>Business / Company Name</label>
        <input type="text" id="companyName" placeholder="e.g. Budi's Store"/>
      </div>
      <div class="input-group">
        <label>Owner Name</label>
        <input type="text" id="name" placeholder="Full name"/>
      </div>
    </div>

    <div class="input-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="you@example.com"/>
    </div>

    <div class="input-group">
      <label>Password</label>
      <div class="input-wrap">
        <input type="password" id="password" placeholder="At least 6 characters"/>
        <button class="toggle-eye" type="button" onclick="togglePass('password',this)">
          <i class="fas fa-eye"></i>
        </button>
      </div>
    </div>

    <button id="registerBtn"><i class="fas fa-user-plus"></i> Create Account</button>

    <hr/>

    <div class="link">Already have an account? <a href="login.html">Sign in here</a></div>

  </div>

  <div id="toast-container"></div>
  <script type="module" src="../js/auth.js"></script>
  <script>
    function togglePass(id,btn){const i=document.getElementById(id);i.type=i.type==='password'?'text':'password';btn.innerHTML=i.type==='password'?'<i class="fas fa-eye"></i>':'<i class="fas fa-eye-slash"></i>';}
    window.showToast=function(msg,type='info'){const ic={success:'fa-circle-check',error:'fa-circle-xmark',info:'fa-circle-info'};const el=document.createElement('div');el.className=`toast ${type}`;el.innerHTML=`<i class="fas ${ic[type]||ic.info}"></i> ${msg}`;document.getElementById('toast-container').appendChild(el);setTimeout(()=>el.remove(),3500);};
  </script>
</body>
</html>
