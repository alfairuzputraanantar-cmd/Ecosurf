<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CocaCoy ERP – History</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <!-- FOUC prevention -->
  <script>
    (function () {
      const t = localStorage.getItem('cocacoy_theme');
      if (t === 'light') document.documentElement.setAttribute('data-theme', 'light');
    })();
  </script>
</head>

<body>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-img-wrap"><img src="cocacoy_logo.jpeg" alt="CocaCoy" /></div>
      <div class="logo-text-wrap">
        <div class="logo-name">CocaCoy</div>
        <div class="logo-tag">ERP System</div>
      </div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Main Menu</div>
      <a class="nav-link" href="/"><i class="fas fa-chart-pie"></i> Dashboard</a>
      <a class="nav-link" href="product"><i class="fas fa-boxes-stacked"></i> Products</a>
      <a class="nav-link active" href="history"><i class="fas fa-clock-rotate-left"></i> History</a>
      <a class="nav-link" href="chart"><i class="fas fa-chart-line"></i> Charts</a>
      <a class="nav-link" href="cashier"><i class="fas fa-cash-register"></i> Cashier</a>
    </div>
    <div class="sidebar-section" style="margin-top:6px;">
      <div class="sidebar-label">Other</div>
      <a class="nav-link" href="settings"><i class="fas fa-gear"></i> Settings</a>
      <a class="nav-link" href="help"><i class="fas fa-circle-question"></i> Help</a>
    </div>
    <div class="sidebar-footer">
      <a href="profile" class="user-pill">
        <div class="user-avatar" id="sidebarAvatar">U</div>
        <div class="user-info">
          <div class="user-name" id="sidebarName">Owner</div>
          <div class="user-role" id="sidebarRole">UMKM Admin</div>
        </div>
      </a>
      <button class="logout-btn" id="logoutBtn"><i class="fas fa-right-from-bracket"></i> Sign Out</button>
    </div>
    <script>
      (function() {
        try {
          const p = JSON.parse(localStorage.getItem('cocacoy_profile') || '{}');
          if (p.ownerName) document.getElementById('sidebarName').textContent = p.ownerName;
          if (p.role) document.getElementById('sidebarRole').textContent = p.role;
          const logo = localStorage.getItem('cocacoy_store_logo');
          if (logo) {
            document.getElementById('sidebarAvatar').innerHTML = `<img src="${logo}" style="width:100%;height:100%;object-fit:cover;border-radius:inherit;"/>`;
          } else if (p.ownerName) {
            document.getElementById('sidebarAvatar').textContent = p.ownerName.charAt(0).toUpperCase();
          }
        } catch(e) {}
      })();
    </script>
  </aside>

  <div class="main-wrap">
    <div class="topbar">
      <div>
        <div class="topbar-title">Transaction History</div>
        <div class="topbar-sub">All product movements — added, edited, deleted</div>
      </div>
      <div class="topbar-right">

        <!-- Theme toggle -->
        <button class="theme-toggle-btn" id="themeToggleBtn" title="Toggle light/dark mode">
          <i class="fas fa-moon" id="themeIcon"></i>
        </button>

        <!-- Notification bell -->
        <div class="bell-wrap" id="bellWrap">
          <button class="icon-btn" id="bellBtn" onclick="toggleNotifPanel()" title="Low stock alerts">
            <i class="fas fa-bell"></i>
            <span class="notif-badge" id="notifBadge" style="display:none;"></span>
          </button>
          <div class="notif-panel" id="notifPanel">
            <div class="notif-panel-header">
              <div class="notif-panel-title"><i class="fas fa-triangle-exclamation"></i> Low Stock Alerts</div>
              <button class="notif-panel-clear"
                onclick="document.getElementById('notifPanel').classList.remove('open')">✕</button>
            </div>
            <div class="notif-panel-body" id="notifPanelBody">
              <div class="notif-panel-empty"><i class="fas fa-circle-check"
                  style="color:var(--green);opacity:1;"></i>Loading...</div>
            </div>
            <div class="notif-panel-footer">
              <a href="product"><i class="fas fa-arrow-right"></i> Manage Products</a>
            </div>
          </div>
        </div>

        <button class="icon-btn" id="menuToggle" style="display:none;"><i class="fas fa-bars"></i></button>
      </div>
    </div>
    <div class="content">

      <!-- Search + Tab filters -->
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap;">
        <div class="search-box"
          style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:9px 14px;flex:1;min-width:180px;">
          <i class="fas fa-magnifying-glass" style="color:var(--muted);font-size:13px;"></i>
          <input type="text" id="historySearch" placeholder="Search history..." oninput="filterHistory()"
            style="background:none;border:none;outline:none;color:var(--text);font-size:13px;font-family:var(--font);width:100%;" />
        </div>
        <!-- Tab buttons -->
        <div class="scroll-tabs">
          <button class="hist-tab btn btn-sm" data-tab="all" onclick="switchHistoryTab('all')"
            style="background:var(--brand-grd);color:#fff;border:1px solid transparent;">
            <i class="fas fa-list"></i> All
          </button>
          <button class="hist-tab btn btn-sm" data-tab="Added" onclick="switchHistoryTab('Added')"
            style="background:var(--surface2);color:var(--muted);border:1px solid var(--border);">
            <i class="fas fa-plus-circle"></i> Added
          </button>
          <button class="hist-tab btn btn-sm" data-tab="Edited" onclick="switchHistoryTab('Edited')"
            style="background:var(--surface2);color:var(--muted);border:1px solid var(--border);">
            <i class="fas fa-pen-to-square"></i> Edited
          </button>
          <button class="hist-tab btn btn-sm" data-tab="Deleted" onclick="switchHistoryTab('Deleted')"
            style="background:var(--surface2);color:var(--muted);border:1px solid var(--border);">
            <i class="fas fa-trash"></i> Deleted
          </button>
          <button class="hist-tab btn btn-sm" data-tab="Sold" onclick="switchHistoryTab('Sold')"
            style="background:var(--surface2);color:var(--muted);border:1px solid var(--border);">
            <i class="fas fa-shopping-cart"></i> Sold
          </button>
        </div>
      </div>

      <div class="history-list" id="historyList">
        <div class="empty-state"><i class="fas fa-clock-rotate-left"></i>
          <p>No transaction history yet.</p>
        </div>
      </div>
      <table style="display:none;">
        <tbody id="historyTable"></tbody>
      </table>
    </div>
  </div>

  <div id="toast-container"></div>
  <script type="module" src="./js/guard.js"></script>
  <script src="./js/ui.js"></script>
  <script type="module" src="./js/history.js"></script>
  <script type="module" src="./js/notifications.js"></script>
  <script>
    window.renderHistoryCards = function (rows) {
      const list = document.getElementById('historyList');
      if (!rows || rows.length === 0) { list.innerHTML = '<div class="empty-state"><i class="fas fa-clock-rotate-left"></i><p>No transaction history yet.</p></div>'; return; }
      const em = { Food: '🍱', Beverages: '🥤', Electronics: '💡', Clothing: '👕', Cosmetics: '💄', Others: '📦' };
      list.innerHTML = rows.map(r => `<div class="history-item" data-search="${(r.product || r.name || '').toLowerCase()}"><div class="history-icon">${em[r.category] || '📦'}</div><div class="history-info"><div class="history-name">${r.product || r.name || '-'}</div><div class="history-meta">${r.details || ''}</div></div><div class="history-date">${r.date || ''}</div></div>`).join('');
    };
    window.filterHistory = function () { const q = document.getElementById('historySearch').value.toLowerCase(); document.querySelectorAll('.history-item').forEach(el => { el.style.display = el.dataset.search.includes(q) ? '' : 'none'; }); };
    /* Mobile sidebar toggle visibility managed by CSS now, but keeping function for safety if needed */
    function checkMobile() {
      const toggle = document.getElementById('menuToggle');
      if (toggle) toggle.style.display = window.innerWidth <= 768 ? 'grid' : 'none';
    }
    checkMobile();
    window.addEventListener('resize', checkMobile);
    window.showToast = function (msg, type = 'info') { const ic = { success: 'fa-circle-check', error: 'fa-circle-xmark', info: 'fa-circle-info', warning: 'fa-triangle-exclamation' }; const el = document.createElement('div'); el.className = `toast ${type}`; el.innerHTML = `<i class="fas ${ic[type] || ic.info}"></i> ${msg}`; document.getElementById('toast-container').appendChild(el); setTimeout(() => el.remove(), 3500); };

    /* ── Theme toggle ── */
    (function () {
      const btn = document.getElementById('themeToggleBtn');
      const icon = document.getElementById('themeIcon');
      function applyTheme(theme) {
        if (theme === 'light') {
          document.documentElement.setAttribute('data-theme', 'light');
          icon.className = 'fas fa-sun';
        } else {
          document.documentElement.removeAttribute('data-theme');
          icon.className = 'fas fa-moon';
        }
        localStorage.setItem('cocacoy_theme', theme);
      }
      applyTheme(localStorage.getItem('cocacoy_theme') || 'dark');
      btn.addEventListener('click', () => {
        const current = localStorage.getItem('cocacoy_theme') || 'dark';
        applyTheme(current === 'dark' ? 'light' : 'dark');
      });
    })();
  </script>
</body>

</html>
