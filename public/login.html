<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CocaCoy ERP – Login</title>
  <link rel="stylesheet" href="auth.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body class="auth-page">

  <div class="auth-card">

    <div class="auth-logo">
      <div class="logo-img-wrap">
        <img src="cocacoy_logo.jpeg" alt="CocaCoy"/>
      </div>
      <div class="brand">CocaCoy</div>
      <div class="tagline">Simple ERP solution for your small business</div>
    </div>

    <div class="auth-section-title">Sign in to your account</div>

    <div class="input-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="you@example.com"/>
    </div>

    <div class="input-group">
      <label>Password</label>
      <div class="input-wrap">
        <input type="password" id="password" placeholder="Enter your password"/>
        <button class="toggle-eye" type="button" onclick="togglePass('password',this)">
          <i class="fas fa-eye"></i>
        </button>
      </div>
    </div>

    <button id="loginBtn"><i class="fas fa-right-to-bracket"></i> Sign In</button>

    <div style="margin-top: 24px; text-align: center;">
      <div style="font-size: 12px; color: var(--muted); margin-bottom: 12px; display: flex; align-items: center; justify-content: center; gap: 10px;">
        <span style="height:1px; flex:1; background:var(--border);"></span>
        <span>Or explore demo</span>
        <span style="height:1px; flex:1; background:var(--border);"></span>
      </div>
      <button id="demoBtn"><i class="fas fa-rocket"></i> Try Demo Account</button>
    </div>

    <div class="link">Don't have an account? <a href="register">Create one here</a></div>

  </div>

  <div id="toast-container"></div>
  <script type="module" src="./js/auth.js"></script>
  <script>
    function togglePass(id,btn){const i=document.getElementById(id);i.type=i.type==='password'?'text':'password';btn.innerHTML=i.type==='password'?'<i class="fas fa-eye"></i>':'<i class="fas fa-eye-slash"></i>';}
    window.showToast=function(msg,type='info'){const ic={success:'fa-circle-check',error:'fa-circle-xmark',info:'fa-circle-info'};const el=document.createElement('div');el.className=`toast ${type}`;el.innerHTML=`<i class="fas ${ic[type]||ic.info}"></i> ${msg}`;document.getElementById('toast-container').appendChild(el);setTimeout(()=>el.remove(),3500);};
  </script>
</body>
</html>
